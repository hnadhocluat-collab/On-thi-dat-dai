<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Ôn Thi Luật Đất Đai 2024 - 120+ Câu Hỏi</title>
    <style>
        :root { --primary: #003366; --accent: #c0392b; --bg: #fdfdfd; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #ececec; margin: 0; padding: 20px; display: flex; justify-content: center; }
        #quiz-container { background: white; width: 100%; max-width: 850px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .info-bar { display: flex; justify-content: space-between; padding: 10px 25px; background: #f8f9fa; border-bottom: 2px solid #ddd; font-weight: bold; }
        .timer-box { color: var(--accent); font-size: 1.2rem; }
        .content { padding: 30px; }
        .question-box { font-size: 1.25rem; font-weight: bold; color: #222; margin-bottom: 25px; line-height: 1.5; }
        .option { display: block; width: 100%; padding: 15px; margin-bottom: 12px; border: 2px solid #eee; border-radius: 8px; text-align: left; cursor: pointer; font-size: 1rem; transition: all 0.2s; background: #fff; }
        .option:hover { background: #f0f7ff; border-color: #3498db; }
        .correct { background: #d4edda !important; border-color: #28a745 !important; color: #155724; font-weight: bold; }
        .wrong { background: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        .explanation { margin-top: 20px; padding: 20px; background: #fff3cd; border-left: 6px solid #ffc107; line-height: 1.6; }
        .btn-action { background: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 6px; cursor: pointer; font-size: 1rem; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div class="header"><h1>NGÂN HÀNG ÔN THI LUẬT ĐẤT ĐAI (120+ CÂU)</h1></div>

    <div id="start-screen" class="content" style="text-align: center;">
        <h2>Chào bạn!</h2>
        <p>Hệ thống đã sẵn sàng với hơn 120+ câu hỏi trắc nghiệm & tình huống bài tập.</p>
        <p><i>Lưu ý: Các câu làm sai sẽ được hỏi lại cho đến khi bạn thuộc.</i></p>
        <button class="btn-action" onclick="startApp()">BẮT ĐẦU ÔN TẬP</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="info-bar">
            <span>Tiến độ: <span id="q-current">1</span>/<span id="q-total">300</span></span>
            <span class="timer-box">Thời gian: <span id="time-left">30</span>s</span>
            <span>Đúng: <span id="score-count">0</span></span>
        </div>
        <div class="content">
            <div id="question-text" class="question-box"></div>
            <div id="options-list"></div>
            <div id="exp-area" class="explanation hidden"></div>
            <div style="text-align: right; margin-top: 20px;">
                <button id="btn-next" class="btn-action hidden" onclick="handleNext()">TIẾP THEO</button>
            </div>
        </div>
    </div>

    <div id="result-screen" class="hidden" style="text-align: center; padding: 50px;">
        <h2>KẾT THÚC VÒNG ÔN TẬP</h2>
        <h1 id="final-stats">0/300</h1>
        <div id="fail-info" style="color: red; margin-bottom: 20px;"></div>
        <button class="btn-action" onclick="restartWithErrors()">ÔN LẠI CÂU SAI</button>
        <button class="btn-action" style="background:#666" onclick="location.reload()">LÀM MỚI TOÀN BỘ</button>
    </div>
</div>

    { q: "Định nghĩa nào sau đây nói về 'Đất' dưới góc độ tư liệu sản xuất nông nghiệp?", options: ["Đối lập với trời hoặc biển", "Lớp vỏ ngoài cùng của Trái đất", "Hạt vụn khoáng vật có mùn để trồng trọt", "Khoảng mặt đất rộng"], correct: 2, exp: "Đất (nông nghiệp) là các hạt vụn khoáng vật... có nhiều chất hữu cơ gọi là mùn, trên đó có thể trồng trọt được." },
    { q: "Khái niệm 'Đất đai' (nói khái quát) được hiểu là?", options: ["Lớp mùn trên mặt đất", "Tài sản của Nhà nước", "Khoảng mặt đất tương đối rộng", "Tư liệu sản xuất"], correct: 2, exp: "Đất đai: Là khoảng mặt đất tương đối rộng (nói khái quát)." },

    // NHÓM 5: 60 CÂU VIẾT MỚI HOÀN TOÀN (Câu 96 - 155)
    // ==========================================================================
    { q: "Cá nhân không trực tiếp sản xuất nông nghiệp được nhận chuyển nhượng loại đất nào theo Luật 2024?", options: ["Đất rừng phòng hộ", "Đất trồng lúa", "Đất rừng đặc dụng", "Không được nhận loại nào"], correct: 1, exp: "Luật 2024 cho phép cá nhân không trực tiếp sản xuất nông nghiệp được nhận chuyển nhượng đất trồng lúa." },
    { q: "Trường hợp thu hồi đất ở mà người dân không còn chỗ ở nào khác, Nhà nước phải?", options: ["Chỉ đền bù bằng tiền", "Bố trí tái định cư trước khi thu hồi", "Để người dân tự tìm chỗ ở", "Cho thuê nhà ở xã hội"], correct: 1, exp: "Nhà nước phải hoàn thành bố trí tái định cư trước khi ban hành quyết định thu hồi đất." },
    { q: "Quyền lựa chọn hình thức trả tiền thuê đất (hàng năm hoặc một lần) áp dụng cho?", options: ["Chỉ cá nhân", "Chỉ tổ chức nước ngoài", "Tổ chức kinh tế, cá nhân, người VN định cư ở nước ngoài", "Chỉ doanh nghiệp nhà nước"], correct: 2, exp: "Luật 2024 mở rộng quyền lựa chọn hình thức nộp tiền thuê đất cho nhiều đối tượng." },
    { q: "Ai có thẩm quyền quyết định giá đất cụ thể?", options: ["Bộ trưởng Bộ TN&MT", "Chủ tịch UBND cấp tỉnh", "Chủ tịch UBND cấp huyện (trong một số trường hợp)", "Cả B và C đều đúng"], correct: 3, exp: "Luật mới phân cấp thẩm quyền quyết định giá đất cụ thể cho cả UBND cấp tỉnh và cấp huyện." },
    { q: "Việc bồi thường khi Nhà nước thu hồi đất phải đảm bảo người có đất bị thu hồi có chỗ ở, mức sống?", options: ["Thấp hơn nơi cũ", "Bằng nơi cũ", "Bằng hoặc tốt hơn nơi cũ", "Tùy điều kiện địa phương"], correct: 2, exp: "Đây là nguyên tắc quan trọng hàng đầu trong Luật Đất đai 2024." },
    { q: "Đất sử dụng vào mục đích tôn giáo được Nhà nước?", options: ["Giao đất không thu tiền sử dụng đất", "Cho thuê đất trả tiền hàng năm", "Giao đất có thu tiền", "Cho thuê đất trả tiền một lần"], correct: 0, exp: "Đất xây dựng cơ sở tôn giáo thuộc đối tượng được giao đất không thu tiền sử dụng đất." },
    { q: "Sổ đỏ (GCN) cấp cho hộ gia đình trước 2024, từ 1/1/2025 sẽ được ghi tên ai?", options: ["Tên chủ hộ", "Tên tất cả các thành viên có chung quyền", "Tên người đại diện", "Tên người đứng tên cũ"], correct: 1, exp: "Để minh bạch, GCN sẽ ghi tên tất cả các thành viên có chung quyền sử dụng đất." },
    { q: "Hành vi nào bị cấm đối với cơ quan quản lý đất đai?", options: ["Giải quyết đúng hạn", "Cung cấp thông tin đất đai chậm trễ, sai lệch", "Tổ chức hòa giải", "Niêm yết bảng giá đất"], correct: 1, exp: "Cung cấp thông tin chậm, thiếu chính xác là hành vi bị nghiêm cấm tại Điều 11." },
    { q: "Khi chuyển mục đích sử dụng đất, căn cứ để tính tiền sử dụng đất là?", options: ["Giá đất tại thời điểm mua", "Giá đất tại thời điểm có quyết định cho phép chuyển mục đích", "Giá do người dân tự kê khai", "Giá trung bình 5 năm"], correct: 1, exp: "Tiền sử dụng đất tính theo giá đất tại thời điểm Nhà nước cho phép chuyển mục đích." },
    { q: "[TÌNH HUỐNG MỚI - 1] Công ty A thuê đất trả tiền hàng năm để làm nhà xưởng. Sau 3 năm, Công ty muốn bán nhà xưởng cho Công ty B. Quyền sử dụng đất sẽ xử lý thế nào?", options: ["Không được bán", "Được bán tài sản và người mua được tiếp tục thuê đất", "Bị thu hồi đất ngay", "Phải mua đứt quyền sử dụng đất"], correct: 1, exp: "Người thuê đất trả tiền hàng năm có quyền bán tài sản gắn liền với đất, người mua được Nhà nước tiếp tục cho thuê." },
    { q: "[TÌNH HUỐNG MỚI - 2] Anh Nam có mảnh đất 100m2 bị thu hồi để làm đường cao tốc. Giá bảng giá đất là 10tr/m2, giá thị trường là 30tr/m2. Anh được đền bù theo giá nào?", options: ["10 triệu", "30 triệu (theo giá đất cụ thể)", "20 triệu", "Không được đền bù"], correct: 1, exp: "Bồi thường dựa trên giá đất cụ thể do UBND cấp có thẩm quyền quyết định, sát giá thị trường." },
    { q: "Cơ quan nào có chức năng lập Bảng giá đất hàng năm?", options: ["UBND cấp xã", "Sở Tài nguyên và Môi trường", "Cục Thuế", "Hội đồng nhân dân"], correct: 1, exp: "Sở TNMT chủ trì, phối hợp các đơn vị lập bảng giá đất trình UBND tỉnh." },
    { q: "Người sử dụng đất có quyền tặng cho QSDĐ cho ai?", options: ["Chỉ người thân trong gia đình", "Nhà nước, cộng đồng dân cư hoặc cá nhân theo quy định", "Chỉ cho tổ chức từ thiện", "Không được tặng cho"], correct: 1, exp: "Người sử dụng đất có quyền tặng cho QSDĐ cho Nhà nước, cộng đồng dân cư hoặc đối tượng khác theo luật." },
    { q: "Khi Nhà nước thu hồi đất nông nghiệp, nếu không có đất để bồi thường thì?", options: ["Không bồi thường", "Bồi thường bằng tiền", "Bồi thường bằng nhà ở", "Cả B và C đều đúng"], correct: 3, exp: "Ưu tiên bồi thường bằng đất cùng mục đích, nếu không có thì bồi thường bằng tiền hoặc đất khác/nhà ở." },
    { q: "Thời hạn thông báo thu hồi đất vì mục đích quốc phòng, an ninh đối với đất phi nông nghiệp là?", options: ["90 ngày", "180 ngày", "30 ngày", "12 tháng"], correct: 1, exp: "Phải thông báo cho người có đất bị thu hồi chậm nhất là 180 ngày đối với đất phi nông nghiệp." },
    { q: "Đối với đất nông nghiệp, thời hạn thông báo thu hồi đất là bao nhiêu ngày?", options: ["30 ngày", "60 ngày", "90 ngày", "180 ngày"], correct: 2, exp: "Phải thông báo chậm nhất là 90 ngày đối với đất nông nghiệp." },
    { q: "Hành vi lấn đất là gì?", options: ["Sử dụng đất vượt ranh giới đã được cấp", "Chuyển mục đích trái phép", "Không sử dụng đất", "Xây nhà cao hơn quy định"], correct: 0, exp: "Lấn đất là hành vi dịch chuyển mốc giới hoặc ranh giới thửa đất để mở rộng diện tích sử dụng." },
    { q: "Hành vi chiếm đất là gì?", options: ["Tự ý sử dụng đất mà không được cơ quan nhà nước cho phép", "Sử dụng đất đúng sổ đỏ", "Cho thuê lại đất", "Mua đất bằng giấy tay"], correct: 0, exp: "Chiếm đất là việc sử dụng đất mà không có quyền sử dụng hợp pháp." },
    { q: "Đất sử dụng cho hoạt động khoáng sản thuộc nhóm đất nào?", options: ["Đất nông nghiệp", "Đất phi nông nghiệp", "Đất chưa sử dụng", "Đất công ích"], correct: 1, exp: "Đất cho hoạt động khoáng sản thuộc nhóm đất phi nông nghiệp theo Điều 9." },
    { q: "Việc khai thác quỹ đất để phát triển kinh tế thông qua dự án nào?", options: ["Dự án khu đô thị", "Dự án khu dân cư nông thôn", "Dự án xây nhà kho tư nhân", "Cả A và B"], correct: 3, exp: "Nhà nước thu hồi đất để thực hiện các dự án khu đô thị, khu dân cư nông thôn để phát triển kinh tế." },
    { q: "Tổ chức nào được Nhà nước giao đất không thu tiền sử dụng đất?", options: ["Đơn vị vũ trang nhân dân", "Doanh nghiệp FDI", "Hộ gia đình kinh doanh", "Công ty bất động sản"], correct: 0, exp: "Đơn vị vũ trang sử dụng đất quốc phòng, an ninh được giao đất không thu tiền." },
    { q: "Người Việt Nam định cư ở nước ngoài được sở hữu nhà ở gắn liền với QSDĐ tại VN khi?", options: ["Chỉ cần có hộ chiếu VN", "Được phép nhập cảnh vào VN", "Phải có quốc tịch nước ngoài", "Chỉ được mua chung cư"], correct: 1, exp: "Luật 2024 cho phép người VN định cư ở nước ngoài có quyền sở hữu nhà ở như công dân trong nước." },
    { q: "Tranh chấp đất đai đã được hòa giải tại xã nhưng một bên không thực hiện thì?", options: ["Hòa giải lại", "Cưỡng chế thực hiện theo biên bản hòa giải thành", "Hủy bỏ kết quả", "Phạt tiền"], correct: 1, exp: "Biên bản hòa giải thành có giá trị pháp lý, nếu không thực hiện sẽ bị cưỡng chế." },
    { q: "Mục đích của việc lập quy hoạch sử dụng đất là?", options: ["Để bán đất giá cao", "Phân bổ nguồn lực đất đai phù hợp mục tiêu phát triển", "Hạn chế quyền người dân", "Tăng thuế đất"], correct: 1, exp: "Quy hoạch giúp phân bổ quỹ đất hợp lý, tiết kiệm và hiệu quả cho các ngành, lĩnh vực." },
    { q: "Kế hoạch sử dụng đất cấp huyện hàng năm nhằm?", options: ["Xác định các thửa đất sẽ bị thu hồi trong năm", "Tăng giá đất", "Bỏ quy hoạch cũ", "Giao đất cho doanh nghiệp"], correct: 0, exp: "Kế hoạch năm là căn cứ để thực hiện thu hồi đất, giao đất, cho thuê đất trong năm đó." },
    { q: "Đất trồng cây lâu năm có thời hạn sử dụng bao nhiêu năm khi được giao?", options: ["20 năm", "50 năm", "70 năm", "Lâu dài"], correct: 1, exp: "Tương tự đất cây hàng năm, đất cây lâu năm giao cho hộ gia đình có thời hạn 50 năm." },
    { q: "Người sử dụng đất có nghĩa vụ gì khi sử dụng đất?", options: ["Muốn làm gì thì làm", "Sử dụng đúng mục đích, đúng ranh giới", "Không cần nộp thuế", "Để đất trống tùy ý"], correct: 1, exp: "Nghĩa vụ cơ bản là sử dụng đúng mục đích, ranh giới và bảo vệ đất." },
    { q: "Hệ thống thông tin đất đai quốc gia do ai quản lý?", options: ["Tập đoàn Viettel", "Bộ Tài nguyên và Môi trường", "Bộ Công an", "Các sàn bất động sản"], correct: 1, exp: "Bộ TNMT thống nhất quản lý và vận hành hệ thống thông tin đất đai quốc gia." },
    { q: "Việc công chứng hợp đồng đất đai được thực hiện tại?", options: ["UBND xã", "Văn phòng công chứng hoặc Phòng công chứng", "Công ty luật", "Văn phòng đăng ký đất đai"], correct: 1, exp: "Các giao dịch quyền sử dụng đất phải được công chứng hoặc chứng thực." },
    { q: "Chứng thực hợp đồng đất đai được thực hiện tại?", options: ["UBND cấp xã", "UBND cấp huyện", "Sở Tư pháp", "Tòa án"], correct: 0, exp: "UBND cấp xã có thẩm quyền chứng thực các hợp đồng, giao dịch về đất đai." },
    { q: "Khi chuyển nhượng đất, ai là người có nghĩa vụ nộp thuế TNCN (thông thường)?", options: ["Người mua", "Người bán", "Nhà nước", "Cả hai chia đôi"], correct: 1, exp: "Thông thường người bán có thu nhập từ việc bán đất nên phải nộp thuế TNCN." },
    { q: "Lệ phí trước bạ khi mua bán đất do ai nộp (thông thường)?", options: ["Người bán", "Người mua", "Người môi giới", "Miễn phí"], correct: 1, exp: "Người đăng ký quyền sở hữu, quyền sử dụng (người mua) là người nộp lệ phí trước bạ." },
    { q: "Đối tượng nào được Nhà nước hỗ trợ đào tạo, chuyển đổi nghề nghiệp khi thu hồi đất?", options: ["Người giàu", "Hộ gia đình, cá nhân trực tiếp sản xuất nông nghiệp", "Doanh nghiệp nước ngoài", "Công chức nhà nước"], correct: 1, exp: "Chính sách này hỗ trợ những người mất đi tư liệu sản xuất chính là đất nông nghiệp." },
    { q: "Quỹ đất công ích của xã (5%) dùng để làm gì?", options: ["Chia cho cán bộ xã", "Xây dựng các công trình công cộng của xã", "Bán lấy tiền", "Cho người giàu thuê"], correct: 1, exp: "Dùng cho nhu cầu công cộng của địa phương hoặc cho hộ dân nghèo thuê sản xuất." },
    { q: "Người sử dụng đất có quyền thế chấp QSDĐ tại đâu?", options: ["Chỉ các cá nhân", "Các tổ chức tín dụng được phép hoạt động tại VN", "Tiệm cầm đồ", "Các công ty nước ngoài không có chi nhánh tại VN"], correct: 1, exp: "Thế chấp tại các ngân hàng, tổ chức tín dụng để bảo đảm nghĩa vụ dân sự." },
    { q: "Quyền thừa kế đất đai được thực hiện theo?", options: ["Di chúc hoặc pháp luật", "Chỉ theo di chúc", "Chỉ theo pháp luật", "Sự sắp xếp của xã"], correct: 0, exp: "Quyền sử dụng đất là di sản và được thừa kế theo quy định của Luật Dân sự." },
    { q: "Đất chưa sử dụng bao gồm?", options: ["Đất bãi bồi", "Đất bằng chưa sử dụng, đất đồi núi chưa sử dụng, núi đá không có rừng cây", "Đất đang tranh chấp", "Đất dự án treo"], correct: 1, exp: "Là các loại đất chưa được đưa vào sử dụng cho các mục đích nông nghiệp hay phi nông nghiệp." },
    { q: "Thẩm quyền giải quyết tranh chấp đất đai mà đương sự KHÔNG có Sổ đỏ?", options: ["Chỉ Tòa án", "Chỉ UBND", "Lựa chọn Tòa án hoặc UBND", "Hòa giải tại thôn"], correct: 2, exp: "Luật cho phép người dân lựa chọn hình thức giải quyết tại Tòa hoặc yêu cầu UBND giải quyết." },
    { q: "Khi Tòa án giải quyết tranh chấp đất đai, căn cứ pháp lý là?", options: ["Luật Đất đai và các luật liên quan", "Cảm tính", "Sức mạnh của các bên", "Tục lệ địa phương"], correct: 0, exp: "Dựa trên các quy định pháp luật hiện hành và chứng cứ các bên cung cấp." },
    { q: "Hành vi chậm nộp tiền sử dụng đất sẽ bị?", options: ["Thu hồi đất ngay", "Tính tiền chậm nộp theo quy định pháp luật quản lý thuế", "Bỏ qua", "Bị phạt tù"], correct: 1, exp: "Người sử dụng đất phải chịu trách nhiệm tài chính về việc chậm thực hiện nghĩa vụ." },
    { q: "Đất xây dựng nhà lưu trú công nhân trong khu công nghiệp thuộc nhóm?", options: ["Đất nông nghiệp", "Đất phi nông nghiệp", "Đất ở", "Đất dịch vụ"], correct: 1, exp: "Thuộc nhóm đất phi nông nghiệp phục vụ sản xuất kinh doanh." },
    { q: "Nhà nước khuyến khích khai hoang, phục hóa đối với loại đất nào?", options: ["Đất ở", "Đất chưa sử dụng, đất bãi bồi ven sông ven biển", "Đất rừng đặc dụng", "Đất nghĩa trang"], correct: 1, exp: "Khuyến khích đưa đất vào sử dụng để tăng hiệu quả tài nguyên." },
    { q: "Cơ quan nào chủ trì việc bồi thường, giải phóng mặt bằng?", options: ["Tòa án", "Tổ chức làm nhiệm vụ bồi thường, giải phóng mặt bằng", "Chủ đầu tư", "Ủy ban mặt trận tổ quốc"], correct: 1, exp: "Thường là Trung tâm phát triển quỹ đất hoặc Hội đồng bồi thường huyện." },

// === PHẦN 2: LOGIC XỬ LÝ HỆ THỐNG ===
// ===========================================================================

let quizBank = [];
let currentIndex = 0;
let score = 0;
let timer;
let timeRemaining = 30;
let errorList = [];

function startApp() {
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('quiz-screen').classList.remove('hidden');
    quizBank = [...questionBank].sort(() => Math.random() - 0.5); // Xáo trộn ngẫu nhiên
    renderQuestion();
}

function renderQuestion() {
    if(currentIndex >= quizBank.length) return showFinalResult();
    
    resetQuestionUI();
    const currentQ = quizBank[currentIndex];
    
    document.getElementById('q-current').innerText = currentIndex + 1;
    document.getElementById('q-total').innerText = quizBank.length;
    document.getElementById('question-text').innerText = currentQ.q;
    
    const list = document.getElementById('options-list');
    currentQ.options.forEach((txt, idx) => {
        const b = document.createElement('button');
        b.className = 'option';
        b.innerText = txt;
        b.onclick = () => validateAnswer(idx);
        list.appendChild(b);
    });

    runTimer();
}

function runTimer() {
    timeRemaining = 30;
    document.getElementById('time-left').innerText = timeRemaining;
    timer = setInterval(() => {
        timeRemaining--;
        document.getElementById('time-left').innerText = timeRemaining;
        if(timeRemaining <= 0) {
            clearInterval(timer);
            validateAnswer(-1); // Hết giờ tính là sai
        }
    }, 1000);
}

function validateAnswer(userPick) {
    clearInterval(timer);
    const qData = quizBank[currentIndex];
    const btns = document.querySelectorAll('.option');
    
    btns.forEach(btn => btn.style.pointerEvents = 'none');

    if(userPick === qData.correct) {
        score++;
        document.getElementById('score-count').innerText = score;
        if(userPick !== -1) btns[userPick].classList.add('correct');
    } else {
        if(userPick !== -1) btns[userPick].classList.add('wrong');
        btns[qData.correct].classList.add('correct');
        errorList.push(qData); // Lưu vào danh sách sai để hỏi lại
    }

    document.getElementById('exp-area').innerHTML = `<b>Giải thích:</b> ${qData.exp}`;
    document.getElementById('exp-area').classList.remove('hidden');
    document.getElementById('btn-next').classList.remove('hidden');
}

function handleNext() {
    currentIndex++;
    renderQuestion();
}

function resetQuestionUI() {
    document.getElementById('options-list').innerHTML = '';
    document.getElementById('exp-area').classList.add('hidden');
    document.getElementById('btn-next').classList.add('hidden');
}

function showFinalResult() {
    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('result-screen').classList.remove('hidden');
    document.getElementById('final-stats').innerText = `${score} / ${quizBank.length}`;
    
    const info = document.getElementById('fail-info');
    if(errorList.length > 0) {
        info.innerText = `Bạn còn ${errorList.length} câu chưa đạt. Hệ thống sẽ ưu tiên hỏi lại các câu này!`;
    } else {
        info.innerText = "Tuyệt vời! Bạn đã hoàn thành xuất sắc tất cả câu hỏi.";
    }
}

function restartWithErrors() {
    if(errorList.length === 0) {
        alert("Chúc mừng! Bạn đã thuộc hết bài. Hệ thống sẽ khởi động lại toàn bộ.");
        location.reload();
        return;
    }
    quizBank = [...errorList].sort(() => Math.random() - 0.5);
    errorList = [];
    currentIndex = 0;
    score = 0;
    document.getElementById('score-count').innerText = "0";
    document.getElementById('result-screen').classList.add('hidden');
    document.getElementById('quiz-screen').classList.remove('hidden');
    renderQuestion();
}
</script>
